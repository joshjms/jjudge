syntax = "proto3";

package api;

option go_package = "github.com/jjudge-oj/api/proto;jjudgepb";

import "google/protobuf/timestamp.proto";

message User {
  int64 id = 1;
  string username = 2;
  string email = 3;
  string name = 4;
  string role = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}
